# Construit les installateurs Windows, macOS et Linux à chaque tag v*
# et les attache à une release GitHub en brouillon.
# Déclenchement : git tag v0.1.0 && git push origin v0.1.0
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Installer les dépendances système (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installer Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Installer les dépendances npm
        # Le lock est écrit par npm 11 : on aligne le runner dessus.
        run: |
          npm install -g npm@11
          npm ci

      - name: Construire et publier
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Meriz ${{ github.ref_name }}'
          releaseBody: 'Installateurs Windows, macOS et Linux de Meriz.'
          # Publication directe : les boutons du site pointent sur
          # releases/latest, qui ignore les brouillons.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
