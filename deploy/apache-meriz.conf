# VirtualHost Apache pour servir Meriz sur un (sous-)domaine dédié.
# Inutile si tu sers l'app dans un sous-dossier de public_html : le
# VirtualHost existant s'en charge déjà.
#
# Mise en place :
#   1. Une entrée DNS (A ou CNAME) doit pointer meriz.exemple.fr vers le serveur.
#   2. sudo cp deploy/apache-meriz.conf /etc/apache2/sites-available/meriz.conf
#   3. Remplace meriz.exemple.fr et le DocumentRoot si besoin.
#   4. sudo a2enmod rewrite
#      sudo a2ensite meriz
#      sudo apache2ctl configtest && sudo systemctl reload apache2
#   5. HTTPS : sudo certbot --apache -d meriz.exemple.fr
#      (certificat + redirection 80 vers 443 + renouvellement automatique)

<VirtualHost *:80>
    ServerName meriz.exemple.fr

    # Dossier où le build est déployé (cp -r dist/. vers ce dossier).
    DocumentRoot /var/www/meriz

    <Directory /var/www/meriz>
        Options -Indexes +FollowSymLinks
        # AllowOverride All : laisse le .htaccess du build gérer le
        # repli SPA (toute adresse inconnue renvoie index.html).
        AllowOverride All
        Require all granted
    </Directory>

    # Les assets Vite sont empreints : cache long sans risque.
    <Location /assets/>
        Header set Cache-Control "public, max-age=31536000, immutable"
    </Location>
    # index.html jamais en cache : c'est lui qui pointe vers les
    # nouveaux assets après un déploiement.
    <Location /index.html>
        Header set Cache-Control "no-cache"
    </Location>

    ErrorLog ${APACHE_LOG_DIR}/meriz-error.log
    CustomLog ${APACHE_LOG_DIR}/meriz-access.log combined
</VirtualHost>
