# Configuration nginx pour Meriz (application statique).
# À copier vers /etc/nginx/sites-available/meriz puis activer :
#   sudo cp deploy/nginx-meriz.conf /etc/nginx/sites-available/meriz
#   sudo ln -s /etc/nginx/sites-available/meriz /etc/nginx/sites-enabled/meriz
#   sudo nginx -t && sudo systemctl reload nginx
# Remplace meriz.exemple.fr par ton vrai domaine partout.
# Le HTTPS s'ajoute ensuite avec certbot, qui modifie ce fichier tout seul :
#   sudo certbot --nginx -d meriz.exemple.fr

server {
    listen 80;
    listen [::]:80;
    server_name meriz.exemple.fr;

    root /var/www/meriz;
    index index.html;

    # Repli SPA : un rafraîchissement sur n'importe quelle adresse
    # renvoie l'application, jamais une 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Les assets Vite portent une empreinte dans leur nom :
    # cache long sans risque, ils changent de nom à chaque build.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html ne doit jamais être mis en cache : c'est lui qui
    # pointe vers les nouveaux assets après un déploiement.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Compression
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # En-têtes de sécurité de base
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
}
